name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  build-and-release:
    permissions:
      contents: write
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: maven

      - name: Build with Maven
        run: mvn package -DskipTests

      - name: Package release zip
        run: |
          mkdir -p release/natives
          mkidr -p release/include
          cp target/Alya-*.jar release/Alya.jar
          cp target/libs release/libs
          cp jars/start.sh release/start.sh
          cp jars/README.md release/README.md
          cp jars/include release/include
          cp -r jars/versions/1.8.9/1.8.9-natives/. release/natives/
          cd release
          zip -r ../alya-release.zip .

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          body: |
            Automated release from commit ${{ github.sha }}
            ${{ github.event.head_commit.message || github.event.pull_request.title }}
          files: alya-release.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
